{% extends "base.html" %}
{% block content %}
<section class="page-grid narrow-grid">
  <section class="panel-card">
    <div class="panel-head"><h3>ユーザー設定</h3></div>
    <form id="settingsForm" class="row g-3">
      <div class="col-md-6">
        <label class="form-label">既定のテキストモデル</label>
        <input class="form-control" name="text_ai_model" value="gpt-5.4-mini">
      </div>
      <div class="col-md-6">
        <label class="form-label">既定の画像モデル</label>
        <input class="form-control" name="image_ai_model" value="gpt-image-2" id="imageAiModelInput">
      </div>
      <div class="col-md-4">
        <label class="form-label">画像生成プロバイダー</label>
        <select class="form-select" name="image_ai_provider" id="imageAiProviderSelect">
          <option value="openai">OpenAI</option>
          <option value="grok">Grok / xAI</option>
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label">既定の画質</label>
        <select class="form-select" name="default_quality">
          <option value="low">low</option>
          <option value="medium">medium</option>
          <option value="high">high</option>
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label">既定の画像サイズ</label>
        <select class="form-select" name="default_size">
          <option value="1024x1024">1024x1024</option>
          <option value="1024x1536">1024x1536</option>
          <option value="1536x1024">1536x1024</option>
        </select>
      </div>
      <div class="col-12">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="preferPortraitOnMobile" name="prefer_portrait_on_mobile">
          <label class="form-check-label" for="preferPortraitOnMobile">スマホ時は画像生成を縦長（1024x1536）で優先する</label>
        </div>
      </div>
      <div class="col-md-4">
        <label class="form-label">自動保存間隔</label>
        <select class="form-select" name="autosave_interval">
          <option value="off">off</option>
          <option value="30">30 sec</option>
          <option value="60">60 sec</option>
        </select>
      </div>
      <div class="col-12">
        <hr>
        <h4 class="mb-2">ノベル / 小説作成設定</h4>
        <p class="text-secondary mb-0">通常のチャット生成とは別に、長編小説・章立て・事前生成画像で使うモデルを設定します。</p>
      </div>
      <div class="col-md-6">
        <label class="form-label">小説作成テキストモデル</label>
        <input class="form-control" name="cinema_novel_text_model" value="gpt-5.5">
      </div>
      <div class="col-md-6">
        <label class="form-label">章の目標文字数</label>
        <input class="form-control" type="number" min="1000" max="30000" step="500" name="cinema_novel_chapter_target_chars" value="3500">
      </div>
      <div class="col-md-4">
        <label class="form-label">小説画像プロバイダー</label>
        <select class="form-select" name="cinema_novel_image_ai_provider" id="cinemaNovelImageProviderSelect">
          <option value="openai">OpenAI</option>
          <option value="grok">Grok / xAI</option>
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label">小説画像モデル</label>
        <input class="form-control" name="cinema_novel_image_ai_model" value="gpt-image-2" id="cinemaNovelImageModelInput">
      </div>
      <div class="col-md-2">
        <label class="form-label">小説画像品質</label>
        <select class="form-select" name="cinema_novel_default_quality">
          <option value="low">low</option>
          <option value="medium">medium</option>
          <option value="high">high</option>
        </select>
      </div>
      <div class="col-md-2">
        <label class="form-label">小説画像サイズ</label>
        <select class="form-select" name="cinema_novel_default_size">
          <option value="1024x1024">1024x1024</option>
          <option value="1024x1536">1024x1536</option>
          <option value="1536x1024">1536x1024</option>
        </select>
      </div>
      <div class="col-12">
        <label class="form-label">メモ</label>
        <textarea class="form-control" rows="4" readonly>この画面はログイン中ユーザーの既定値を保存します。API キーやストレージ固有のようなサーバー設定はここでは変更しません。</textarea>
      </div>
      <div class="col-12 d-flex justify-content-end gap-2">
        <button class="btn btn-outline-dark" type="button" id="settingsResetButton">初期値に戻す</button>
        <button class="btn btn-sunrise" type="submit">保存</button>
      </div>
    </form>
  </section>
</section>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/settings_page.js') }}"></script>
{% endblock %}
