{% extends "base.html" %}
{% block content %}
<section class="editor-grid">
  <section class="panel-card">
    <div class="panel-head"><h3>シーン情報</h3></div>
    <div class="vstack gap-3">
      <div><div class="mini-section-title">要約</div><div id="imageSceneSummary" class="mini-board"></div></div>
      <div><div class="mini-section-title">本文</div><div id="imageSceneNarration" class="mini-board"></div></div>
      <div><div class="mini-section-title">登場キャラクター</div><div id="imageCharacters" class="mini-board"></div></div>
      <div><div class="mini-section-title">感情 / 場所 / 時間帯</div><div id="imageMeta" class="mini-board"></div></div>
      <div><div class="mini-section-title">基準画像</div><div id="referenceCharacters" class="mini-board"></div></div>
    </div>
  </section>

  <section class="panel-card">
    <div class="panel-head"><h3>生成画像プレビュー</h3></div>
    <div class="image-stage" id="imageStage">画像を読み込み中...</div>
    <div class="list-stack mt-3" id="imageHistory"></div>
  </section>

  <section class="panel-card">
    <div class="panel-head"><h3>生成設定</h3></div>
    <form id="imageGenerateForm" class="vstack gap-3">
      <div class="row g-3">
        <div class="col-md-6"><label class="form-label">品質</label><select class="form-select" name="quality"><option>low</option><option>medium</option><option>high</option></select></div>
        <div class="col-md-6"><label class="form-label">サイズ</label><select class="form-select" name="size"><option>1024x1024</option><option>1024x1536</option><option>1536x1024</option></select></div>
      </div>
      <div class="form-check form-switch">
        <input class="form-check-input" type="checkbox" id="useCharacterBase" name="use_character_base" checked>
        <label class="form-check-label" for="useCharacterBase">キャラクターの基準画像を reference image として使う</label>
      </div>
      <div class="d-flex justify-content-between align-items-center gap-2">
        <label class="form-label mb-0" for="promptPreview">生成前プロンプト</label>
        <button class="btn btn-sm btn-outline-dark" type="button" id="promptBuildButton">プロンプトを作成</button>
      </div>
      <textarea class="form-control font-mono-sm" id="promptPreview" name="prompt_text" rows="10"></textarea>
      <div class="small text-secondary">ここで画風、構図、表情、不要要素の除外などを編集してから画像生成できます。</div>
      <div class="d-flex gap-2 justify-content-end">
        <button class="btn btn-outline-dark" type="button" id="imageRefreshButton">再生成</button>
        <button class="btn btn-sunrise" type="submit" id="imageGenerateButton">画像を生成</button>
      </div>
    </form>

    <hr>

    <form id="imageUploadForm" class="vstack gap-3">
      <div class="mini-section-title">外部で作った画像を使う</div>
      <input class="form-control" type="file" id="manualImageFile" name="file" accept="image/*">
      <div class="small text-secondary">別の生成AIや手作業で作った画像をアップロードして、このシーンの候補画像として採用できます。</div>
      <div class="d-flex justify-content-end">
        <button class="btn btn-outline-dark" type="submit" id="imageUploadButton">画像をアップロード</button>
      </div>
    </form>
  </section>
</section>
{% endblock %}
{% block scripts %}
<script>
(() => {
  const sceneId = Number({{ scene_id }});
  const historyHost = document.getElementById("imageHistory");
  const form = document.getElementById("imageGenerateForm");
  const uploadForm = document.getElementById("imageUploadForm");
  const imageStage = document.getElementById("imageStage");
  const imageRefreshButton = document.getElementById("imageRefreshButton");
  const imageGenerateButton = document.getElementById("imageGenerateButton");
  const imageUploadButton = document.getElementById("imageUploadButton");
  const promptBuildButton = document.getElementById("promptBuildButton");
  const promptPreview = document.getElementById("promptPreview");
  const defaultGenerateLabel = imageGenerateButton.textContent;
  const defaultRefreshLabel = imageRefreshButton.textContent;
  const defaultUploadLabel = imageUploadButton.textContent;
  const defaultPromptBuildLabel = promptBuildButton.textContent;
  let latestImageId = null;
  let generatedPrompt = "";

  function renderReferenceCharacters(characters) {
    const withBase = (characters || []).filter((character) => character.base_asset?.media_url);
    const host = document.getElementById("referenceCharacters");
    if (!withBase.length) {
      host.innerHTML = `<div class="empty-panel">このシーンで参照に使える基準画像はまだありません。</div>`;
      return;
    }
    host.innerHTML = withBase.map((character) => `
      <div class="d-flex align-items-center gap-2 mb-2">
        <img src="${character.base_asset.media_url}" alt="${NovelUI.escape(character.name)}" style="width:64px;height:64px;object-fit:cover" class="rounded-3 border">
        <div>
          <div class="fw-semibold">${NovelUI.escape(character.name)}</div>
          <div class="small text-secondary">${NovelUI.escape(character.base_asset.file_name || "")}</div>
        </div>
      </div>
    `).join("");
  }

  function renderGeneratingStage(message = "画像を生成中...") {
    imageStage.innerHTML = `
      <div class="text-center">
        <div class="spinner-border text-warning mb-3" role="status" aria-hidden="true"></div>
        <div>${NovelUI.escape(message)}</div>
      </div>
    `;
  }

  function setGenerating(active, mode = "generate") {
    imageGenerateButton.disabled = active;
    imageRefreshButton.disabled = active;
    imageUploadButton.disabled = active;
    promptBuildButton.disabled = active;
    imageGenerateButton.textContent = active && mode === "generate" ? "生成中..." : defaultGenerateLabel;
    imageRefreshButton.textContent = active && mode === "refresh" ? "再生成中..." : defaultRefreshLabel;
    imageUploadButton.textContent = active && mode === "upload" ? "アップロード中..." : defaultUploadLabel;
    promptBuildButton.textContent = active && mode === "prompt" ? "作成中..." : defaultPromptBuildLabel;
    if (active) {
      const message = mode === "refresh"
        ? "画像を再生成中..."
        : mode === "upload"
          ? "画像をアップロード中..."
          : mode === "prompt"
            ? "生成前プロンプトを作成中..."
            : "画像を生成中...";
      renderGeneratingStage(message);
    }
  }

  async function loadImageContext() {
    const payload = await NovelUI.api(`/api/v1/scenes/${sceneId}/image-context`);
    document.getElementById("imageSceneSummary").textContent = payload.image_generation?.scene_summary || "";
    document.getElementById("imageSceneNarration").textContent = payload.scene?.narration_text || "";
    document.getElementById("imageCharacters").innerHTML = (payload.characters || []).map((character) => `<span class="mini-pill">${NovelUI.escape(character.name)}</span>`).join("");
    document.getElementById("imageMeta").innerHTML = `
      <span class="mini-pill">emotion: ${NovelUI.escape(payload.image_generation?.emotion || "-")}</span>
      <span class="mini-pill">place: ${NovelUI.escape(payload.image_generation?.place || "-")}</span>
      <span class="mini-pill">time: ${NovelUI.escape(payload.image_generation?.time_of_day || "-")}</span>
    `;
    generatedPrompt = payload.image_generation?.prompt_preview || "";
    if (!promptPreview.value.trim() || promptPreview.dataset.mode !== "edited") {
      promptPreview.value = generatedPrompt;
      promptPreview.dataset.mode = "generated";
    }
    renderReferenceCharacters(payload.characters || []);

    const selected = payload.selected_image;
    if (selected?.asset?.media_url) {
      latestImageId = selected.id;
      imageStage.innerHTML = `<img src="${selected.asset.media_url}" alt="scene image">`;
    } else {
      imageStage.innerHTML = `<div class="empty-panel">まだ選択済み画像がありません。</div>`;
    }
  }

  async function loadImageHistory() {
    const list = await NovelUI.api(`/api/v1/scenes/${sceneId}/images`);
    historyHost.innerHTML = Array.isArray(list) && list.length ? list.map((item) => `
      <button class="list-row selectable-row ${item.is_selected ? 'active' : ''}" data-select-image="${item.id}">
        <div class="d-flex align-items-center gap-3">
          ${item.asset?.media_url ? `<img src="${item.asset.media_url}" alt="${NovelUI.escape(item.asset.file_name || "scene image")}" style="width:72px;height:72px;object-fit:cover" class="rounded-3 border">` : ""}
          <div>
            <div class="list-title">${NovelUI.escape(item.image_type || "scene image")}</div>
            <div class="list-subtitle">${NovelUI.escape(item.size || "")} / ${NovelUI.escape(item.quality || "")}</div>
            <div class="small text-secondary">${NovelUI.escape(item.asset?.file_name || "")}</div>
          </div>
        </div>
        <div>
          <span class="soft-code">${item.is_selected ? "selected" : "candidate"}</span>
        </div>
      </button>
    `).join("") : `<div class="empty-panel">画像履歴はまだありません。</div>`;
  }

  async function refreshAll() {
    await Promise.all([loadImageContext(), loadImageHistory()]);
  }

  async function generateImage(body, successMessage, mode = "generate") {
    setGenerating(true, mode);
    try {
      await NovelUI.api(`/api/v1/scenes/${sceneId}/images/generate`, { method: "POST", body });
      await refreshAll();
      NovelUI.toast(successMessage);
    } catch (error) {
      NovelUI.toast(error.message || "画像生成に失敗しました。", "danger");
    } finally {
      setGenerating(false);
    }
  }

  form.addEventListener("submit", async (event) => {
    event.preventDefault();
    const body = Object.fromEntries(new FormData(event.currentTarget).entries());
    body.use_character_base = document.getElementById("useCharacterBase").checked;
    body.prompt_text = promptPreview.value.trim();
    await generateImage(body, "画像生成が完了しました。", "generate");
  });

  imageRefreshButton.addEventListener("click", async () => {
    if (!latestImageId) {
      NovelUI.toast("再生成対象の画像がありません。", "warning");
      return;
    }
    await generateImage(
      {
        source_scene_image_id: latestImageId,
        use_character_base: document.getElementById("useCharacterBase").checked,
        prompt_text: promptPreview.value.trim(),
      },
      "再生成が完了しました。",
      "refresh"
    );
  });

  promptPreview.addEventListener("input", () => {
    promptPreview.dataset.mode = "edited";
  });

  promptBuildButton.addEventListener("click", async () => {
    setGenerating(true, "prompt");
    try {
      await loadImageContext();
      promptPreview.value = generatedPrompt;
      promptPreview.dataset.mode = "generated";
      NovelUI.toast("生成前プロンプトを更新しました。");
    } catch (error) {
      NovelUI.toast(error.message || "プロンプト作成に失敗しました。", "danger");
    } finally {
      setGenerating(false);
    }
  });

  uploadForm.addEventListener("submit", async (event) => {
    event.preventDefault();
    const fileInput = document.getElementById("manualImageFile");
    const file = fileInput.files?.[0];
    if (!file) {
      NovelUI.toast("アップロードする画像を選択してください。", "warning");
      return;
    }

    const data = new FormData();
    data.append("file", file);
    data.append("image_type", "scene_full");
    data.append("is_selected", "1");

    setGenerating(true, "upload");
    try {
      const response = await fetch(`/api/v1/scenes/${sceneId}/images/upload`, {
        method: "POST",
        credentials: "same-origin",
        body: data,
      });
      const payload = await response.json().catch(() => ({}));
      const message = payload?.data?.message || payload?.message;
      if (!response.ok) {
        throw new Error(message || `HTTP ${response.status}`);
      }
      uploadForm.reset();
      await refreshAll();
      NovelUI.toast("画像をアップロードして採用しました。");
    } catch (error) {
      NovelUI.toast(error.message || "画像アップロードに失敗しました。", "danger");
    } finally {
      setGenerating(false);
    }
  });

  historyHost.addEventListener("click", async (event) => {
    const button = event.target.closest("[data-select-image]");
    if (!button) return;
    try {
      await NovelUI.api(`/api/v1/scene-images/${button.dataset.selectImage}/select`, { method: "POST", body: {} });
      NovelUI.toast("画像を採用しました。");
      await refreshAll();
    } catch (error) {
      NovelUI.toast(error.message || "採用に失敗しました。", "danger");
    }
  });

  refreshAll().catch((error) => NovelUI.toast(error.message || "読み込みに失敗しました。", "danger"));
})();
</script>
{% endblock %}
