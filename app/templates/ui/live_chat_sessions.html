{% extends "base.html" %}
{% block content %}
<section class="page-grid">
  <div class="toolbar-panel">
    <form class="row g-3 align-items-end" id="liveChatSessionForm">
      <div class="col-md-4">
        <label class="form-label" for="liveChatTitleInput">セッション名</label>
        <input class="form-control" id="liveChatTitleInput" name="title" placeholder="例: 導巫女との会話">
      </div>
      <div class="col-md-4">
        <label class="form-label" for="liveChatPlayerNameInput">プレイヤー名</label>
        <input class="form-control" id="liveChatPlayerNameInput" name="player_name" placeholder="任意">
      </div>
      <div class="col-md-4">
        <label class="form-label" for="liveChatCharacterSelect">登場キャラクター</label>
        <select class="form-select" id="liveChatCharacterSelect" name="character_ids" multiple size="4"></select>
      </div>
      <div class="col-12 d-flex gap-2">
        <button class="btn btn-sunrise" type="submit">新規セッションを作成</button>
        <button class="btn btn-outline-dark" type="button" id="liveChatReloadButton">再読み込み</button>
      </div>
    </form>
  </div>

  <section class="panel-card">
    <div class="panel-head">
      <h3>ライブ会話セッション</h3>
      <span class="soft-code" id="liveChatSessionCount">0 sessions</span>
    </div>
    <div class="project-card-grid" id="liveChatSessionGrid"></div>
  </section>
</section>
{% endblock %}
{% block scripts %}
<script>
(() => {
  const projectId = Number({{ project_id }});
  const form = document.getElementById("liveChatSessionForm");
  const characterSelect = document.getElementById("liveChatCharacterSelect");
  const grid = document.getElementById("liveChatSessionGrid");
  const countLabel = document.getElementById("liveChatSessionCount");

  function renderCharacterOption(character) {
    return `<option value="${character.id}">${NovelUI.escape(character.name)}${character.role ? ` / ${NovelUI.escape(character.role)}` : ""}</option>`;
  }

  async function loadCharacters() {
    const data = await NovelUI.api(`/api/v1/projects/${projectId}/characters`);
    const list = Array.isArray(data) ? data : [];
    characterSelect.innerHTML = list.map(renderCharacterOption).join("");
  }

  async function loadSessions() {
    const data = await NovelUI.api(`/api/v1/chat/sessions?project_id=${projectId}`);
    const list = Array.isArray(data) ? data : [];
    countLabel.textContent = `${list.length} sessions`;
    if (!list.length) {
      grid.innerHTML = `<div class="empty-panel">まだライブ会話セッションがありません。</div>`;
      return;
    }
    grid.innerHTML = list.map((item) => `
      <article class="project-card">
        <div class="project-card-top">
          <span class="badge text-bg-light">${NovelUI.escape(item.status || "active")}</span>
          <span class="soft-code">${item.message_count || 0} messages</span>
        </div>
        <h4>${NovelUI.escape(item.title || "Live Chat")}</h4>
        <p>${NovelUI.escape(item.last_message_text || "まだメッセージはありません。")}</p>
        <div class="mini-pill-row">
          ${(item.characters || []).map((character) => `<span class="mini-pill">${NovelUI.escape(character.name)}</span>`).join("")}
        </div>
        <div class="d-flex justify-content-between align-items-center mt-3">
          <span class="soft-code">${NovelUI.escape(item.player_name || "player")}</span>
          <a class="btn btn-sm btn-dark" href="/projects/${projectId}/live-chat/${item.id}">開く</a>
        </div>
      </article>
    `).join("");
  }

  form.addEventListener("submit", async (event) => {
    event.preventDefault();
    const selectedIds = Array.from(characterSelect.selectedOptions).map((option) => Number(option.value));
    try {
      const created = await NovelUI.api("/api/v1/chat/sessions", {
        method: "POST",
        body: {
          project_id: projectId,
          title: form.title.value,
          player_name: form.player_name.value,
          character_ids: selectedIds,
        },
      });
      NovelUI.toast("ライブ会話セッションを作成しました。");
      window.location.href = `/projects/${projectId}/live-chat/${created.session.id}`;
    } catch (error) {
      NovelUI.toast(error.message || "セッション作成に失敗しました。", "danger");
    }
  });

  document.getElementById("liveChatReloadButton").addEventListener("click", () => {
    loadSessions().catch((error) => {
      NovelUI.toast(error.message || "セッション一覧の再読み込みに失敗しました。", "danger");
    });
  });

  Promise.all([loadCharacters(), loadSessions()]).catch((error) => {
    NovelUI.toast(error.message || "ライブ会話一覧の初期化に失敗しました。", "danger");
  });
})();
</script>
{% endblock %}
