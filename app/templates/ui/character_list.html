{% extends "base.html" %}
{% block content %}
<section class="page-grid" data-character-list-page data-project-id="{{ project_id }}" data-can-manage-project="{{ 'true' if can_manage_project else 'false' }}">
  <section class="toolbar-panel span-12 character-search-panel">
    <form class="character-search-form" id="characterSearchForm">
      <div class="character-search-field">
        <label class="form-label" for="characterSearchInput">キャラクター検索</label>
        <input class="form-control" id="characterSearchInput" name="search" placeholder="名前、あだ名、外見で検索">
      </div>
      <div class="character-search-actions">
        <button class="btn btn-dark" type="submit">検索</button>
        {% if can_manage_project %}
        <a class="btn btn-sunrise" href="/projects/{{ project_id }}/characters/new">追加</a>
        {% endif %}
      </div>
    </form>
  </section>

  <section class="panel-card span-12">
    <div class="panel-head">
      <div>
        <h3>キャラクター一覧</h3>
        <p class="section-copy mb-0">ワールドで会話できるキャラクターを確認できます。</p>
      </div>
    </div>
    <div class="project-card-grid" id="characterGrid"></div>
  </section>
</section>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/character_list_page.js') }}"></script>
{% endblock %}
