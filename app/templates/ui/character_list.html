{% extends "base.html" %}
{% block content %}
<section class="page-grid">
  <div class="toolbar-panel">
    <form class="row g-3 align-items-end" id="characterSearchForm">
      <div class="col-md-8">
        <label class="form-label">キャラクター検索</label>
        <input class="form-control" name="search" placeholder="名前、役割、外見キーワード">
      </div>
      <div class="col-md-4 d-flex gap-2">
        <button class="btn btn-dark w-100" type="submit">検索</button>
        <a class="btn btn-sunrise w-100" href="/projects/{{ project_id }}/characters/new">追加</a>
      </div>
    </form>
  </div>
  <section class="panel-card">
    <div class="panel-head"><h3>キャラクター一覧</h3></div>
    <div class="project-card-grid" id="characterGrid"></div>
  </section>
</section>
{% endblock %}
{% block scripts %}
<script>
(() => {
  const projectId = Number({{ project_id }});
  const form = document.getElementById("characterSearchForm");
  const host = document.getElementById("characterGrid");
  async function loadCharacters() {
    const params = new URLSearchParams();
    const search = new FormData(form).get("search");
    if (search) params.set("search", search);
    const suffix = params.toString() ? `?${params.toString()}` : "";
    const data = await NovelUI.api(`/api/v1/projects/${projectId}/characters${suffix}`);
    const list = Array.isArray(data) ? data : [];
    if (!list.length) {
      host.innerHTML = `<div class="empty-panel">キャラクターがまだいません。</div>`;
      return;
    }
    host.innerHTML = list.map((character) => `
      <article class="project-card">
        <div class="project-card-top">
          <span class="badge text-bg-light">${NovelUI.escape(character.role || "role")}</span>
          ${character.has_image_rule ? '<span class="soft-code">image-rule</span>' : ''}
        </div>
        <h4>${NovelUI.escape(character.name || "No Name")}</h4>
        <p>${NovelUI.escape(character.appearance_summary || character.speech_style || "設定未入力")}</p>
        <div class="d-flex justify-content-between align-items-center mt-3">
          <span class="soft-code">${NovelUI.escape(character.first_person || "一人称未設定")}</span>
          <a class="btn btn-sm btn-dark" href="/projects/${projectId}/characters/${character.id}/edit">編集</a>
        </div>
      </article>
    `).join("");
  }
  form.addEventListener("submit", (event) => { event.preventDefault(); loadCharacters().catch((error) => NovelUI.toast(error.message || "取得に失敗しました。", "danger")); });
  loadCharacters().catch((error) => NovelUI.toast(error.message || "取得に失敗しました。", "danger"));
})();
</script>
{% endblock %}
