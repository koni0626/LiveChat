{% extends "base.html" %}
{% block content %}
<section class="page-grid world-news-page">
  <section class="panel-card world-news-hero">
    <div>
      <div class="eyebrow">World News</div>
      <h2>街の噂とキャラクターの気配</h2>
      <p>施設で起きた小さな出来事、キャラクター同士の関係、次のおでかけにつながる気配を集めます。</p>
    </div>
    <div class="world-news-actions">
      {% if can_manage_project %}
      <button class="btn btn-sunrise btn-sm" type="button" id="worldNewsGenerateButton">
        <i class="bi bi-stars"></i>
        噂を生成
      </button>
      {% endif %}
      <button class="btn btn-outline-light btn-sm" type="button" id="worldNewsReloadButton">
        <i class="bi bi-arrow-clockwise"></i>
        更新
      </button>
    </div>
  </section>

  <section class="panel-card">
    <div class="panel-head">
      <h3>ニュース</h3>
      <span class="soft-code" id="worldNewsCount">0 items</span>
    </div>
    <div class="world-news-list" id="worldNewsList"></div>
  </section>
</section>
{% endblock %}

{% block scripts %}
<script>
(() => {
  const projectId = document.body.dataset.projectId;
  const listHost = document.getElementById("worldNewsList");
  const countLabel = document.getElementById("worldNewsCount");
  const reloadButton = document.getElementById("worldNewsReloadButton");
  const generateButton = document.getElementById("worldNewsGenerateButton");

  function renderLoading(message = "街の噂を集めています。") {
    listHost.innerHTML = `
      <div class="empty-panel world-news-loading">
        <div class="spinner-border spinner-border-sm" aria-hidden="true"></div>
        <div>
          <strong>読み込み中</strong>
          <p>${NovelUI.escape(message)}</p>
        </div>
      </div>
    `;
  }

  function renderNews(items) {
    const list = Array.isArray(items) ? items : [];
    countLabel.textContent = `${list.length} items`;
    if (!list.length) {
      listHost.innerHTML = `
        <div class="empty-panel">
          <i class="bi bi-newspaper"></i>
          <div>
            <strong>まだ噂はありません。</strong>
            <p>おでかけを完了するか、噂を生成するとここに流れます。</p>
          </div>
        </div>
      `;
      return;
    }
    listHost.innerHTML = list.map((item) => `
      <article class="world-news-card">
        <div class="world-news-card-head">
          <span class="world-news-type">${NovelUI.escape(item.news_type_label || item.news_type || "噂")}</span>
          <span class="soft-code">${NovelUI.escape(NovelUI.formatDateTime(item.created_at) || "")}</span>
        </div>
        <h4>${NovelUI.escape(item.title || "街の噂")}</h4>
        <p>${NovelUI.escape(item.body || "")}</p>
        <div class="world-news-meta">
          ${item.related_character ? `<span><i class="bi bi-person-heart"></i>${NovelUI.escape(item.related_character.name)}</span>` : ""}
          ${item.related_location ? `<span><i class="bi bi-geo-alt"></i>${NovelUI.escape(item.related_location.name)}</span>` : ""}
          <span><i class="bi bi-signal"></i>${NovelUI.escape(String(item.importance || 3))}</span>
        </div>
        ${item.return_url ? `<a class="btn btn-outline-light btn-sm" href="${NovelUI.escape(item.return_url)}">関連を見る <i class="bi bi-arrow-right"></i></a>` : ""}
      </article>
    `).join("");
  }

  async function loadNews() {
    renderLoading();
    const items = await NovelUI.api(`/api/v1/projects/${projectId}/world-news`);
    renderNews(items);
  }

  reloadButton.addEventListener("click", () => {
    loadNews().catch((error) => NovelUI.toast(error.message || "ニュースを読み込めませんでした。", "danger"));
  });

  generateButton?.addEventListener("click", async () => {
    generateButton.disabled = true;
    renderLoading("キャラクター、施設、最近の出来事から噂を作っています。");
    try {
      await NovelUI.api(`/api/v1/projects/${projectId}/world-news/generate`, { method: "POST", body: { count: 3 } });
      await loadNews();
      NovelUI.toast("噂を生成しました。");
    } catch (error) {
      NovelUI.toast(error.message || "噂を生成できませんでした。", "danger");
    } finally {
      generateButton.disabled = false;
    }
  });

  loadNews().catch((error) => NovelUI.toast(error.message || "ニュースを読み込めませんでした。", "danger"));
})();
</script>
{% endblock %}
