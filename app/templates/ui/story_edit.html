{% extends "base.html" %}
{% block content %}
<section class="page-grid" data-project-id="{{ project_id }}" data-story-id="{{ story_id or '' }}">
  <section class="panel-card">
    <div class="panel-head">
      <div>
        <h3>{{ "ストーリー編集" if story_id else "ストーリー作成" }}</h3>
        <p class="section-copy mb-0">Markdownで物語設定を書き、セッションの元になるストーリーを作成します。</p>
      </div>
      <a class="btn btn-sm btn-outline-dark" href="{{ url_for('ui.story_list_page', project_id=project_id) }}">一覧へ戻る</a>
    </div>
    <form id="storyEditForm" class="row g-3">
      <div class="col-md-8">
        <label class="form-label" for="storyTitleInput">タイトル</label>
        <input class="form-control" id="storyTitleInput" required>
      </div>
      <div class="col-md-4">
        <label class="form-label" for="storyStatusSelect">状態</label>
        <select class="form-select" id="storyStatusSelect">
          <option value="draft">下書き</option>
          <option value="published">公開</option>
          <option value="archived">アーカイブ</option>
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label" for="storyCharacterSelect">メインキャラクター</label>
        <select class="form-select" id="storyCharacterSelect" required></select>
      </div>
      <div class="col-md-6">
        <label class="form-label" for="storyModeSelect">モード</label>
        <select class="form-select" id="storyModeSelect">
          <option value="free_chat">自由会話</option>
          <option value="dungeon_trpg">ダンジョン探索</option>
          <option value="romance_adventure">恋愛アドベンチャー</option>
          <option value="romantic_comedy">ラブコメ</option>
          <option value="comedy_adventure">コメディ冒険</option>
          <option value="daily_comedy">日常ドタバタ</option>
          <option value="school_mystery">学園ミステリー</option>
          <option value="horror_trpg">怪異・ホラー</option>
          <option value="escape_game">脱出ゲーム</option>
          <option value="isekai_adventure">異世界冒険</option>
          <option value="buddy_mission">バディ任務</option>
          <option value="mystery_trpg">ミステリー攻略</option>
          <option value="event_trpg">イベント重視</option>
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label" for="storyMaxTurnsInput">終了ターン数</label>
        <input class="form-control" id="storyMaxTurnsInput" type="number" min="5" max="20" step="1" value="10">
      </div>
      <div class="col-12">
        <input type="hidden" id="storyOutfitInput" name="default_outfit_id">
        <div class="form-label">基準衣装</div>
        <div class="room-outfit-picker" id="storyOutfitPicker">
          <div class="empty-panel">キャラクターを選択すると衣装が表示されます。</div>
        </div>
      </div>
      <div class="col-12">
        <label class="form-label" for="storyDescriptionInput">説明</label>
        <textarea class="form-control" id="storyDescriptionInput" rows="2"></textarea>
      </div>
      <div class="col-lg-6">
        <label class="form-label" for="storyMarkdownInput">Markdown設定</label>
        <textarea class="form-control story-markdown-input" id="storyMarkdownInput" rows="18" placeholder="# 忘却回廊&#10;&#10;## 概要&#10;ノアと一緒に地下迷宮を探索する。"></textarea>
      </div>
      <div class="col-lg-6">
        <label class="form-label" for="storyMarkdownPreview">Markdownプレビュー</label>
        <div class="markdown-preview story-markdown-preview" id="storyMarkdownPreview"></div>
      </div>
      <div class="col-12 d-flex gap-2 flex-wrap">
        <button class="btn btn-dark" type="submit">保存</button>
        <button class="btn btn-outline-dark" type="button" id="storyDraftButton">Markdown自動作成</button>
        <button class="btn btn-outline-dark" type="button" id="storyOpeningImageButton">オープニング画像を作成</button>
        <label class="btn btn-outline-dark mb-0" for="storyOpeningImageUploadInput">オープニング画像をアップロード</label>
        <input class="d-none" id="storyOpeningImageUploadInput" type="file" accept="image/*">
      </div>
    </form>
  </section>
  <section class="panel-card">
    <div class="panel-head">
      <h3>オープニング画像</h3>
    </div>
    <div class="mb-3" id="storyOpeningImagePreview"></div>
  </section>
</section>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/markdown_editor.js') }}"></script>
<script src="{{ url_for('static', filename='js/outfit_picker.js') }}"></script>
<script src="{{ url_for('static', filename='js/story_edit_page.js') }}"></script>
{% endblock %}
