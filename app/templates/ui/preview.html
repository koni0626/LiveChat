{% extends "base.html" %}
{% block content %}
<section class="novel-preview-stage">
  <div class="novel-preview-frame" id="novelPreviewFrame" tabindex="0" aria-label="ノベルゲームプレビュー">
    <div class="novel-preview-hero" id="previewHero">プレビューを読み込み中です...</div>

    <button class="btn btn-light btn-sm novel-toggle-button" type="button" id="previewTextboxToggleButton">テキストを隠す</button>

    <div class="novel-textbox" id="previewTextbox">
      <div class="novel-textbox-meta">
        <div class="novel-progress" id="previewProgress">0 / 0</div>
      </div>

      <div class="novel-speaker" id="previewSpeaker" hidden></div>
      <div class="novel-text" id="previewText"></div>

      <div class="novel-choice-list" id="previewChoices"></div>

      <div class="novel-controls">
        <div class="novel-hint" id="previewHint">Enter で続きを表示</div>
        <button class="btn btn-light" type="button" id="previewNextButton">次へ</button>
      </div>
    </div>
  </div>
</section>
{% endblock %}
{% block scripts %}
<script>
(() => {
  const sceneId = Number({{ scene_id }});
  const heroEl = document.getElementById("previewHero");
  const speakerEl = document.getElementById("previewSpeaker");
  const textEl = document.getElementById("previewText");
  const choicesEl = document.getElementById("previewChoices");
  const progressEl = document.getElementById("previewProgress");
  const hintEl = document.getElementById("previewHint");
  const frameEl = document.getElementById("novelPreviewFrame");
  const nextButton = document.getElementById("previewNextButton");
  const textboxEl = document.getElementById("previewTextbox");
  const textboxToggleButton = document.getElementById("previewTextboxToggleButton");

  let chunks = [];
  let cursor = 0;
  let pageCursor = 0;
  let currentPages = [];
  let revealedLength = 0;
  let typingTimer = null;
  let measureEl = null;
  let protagonistName = "主人公";
  let textboxVisible = true;

  function setTextboxVisible(visible) {
    textboxVisible = visible;
    textboxEl.hidden = !visible;
    textboxToggleButton.textContent = visible ? "テキストを隠す" : "テキストを表示";
  }

  function stopTyping() {
    if (typingTimer) {
      clearTimeout(typingTimer);
      typingTimer = null;
    }
  }

  function ensureMeasureElement() {
    if (measureEl) {
      return measureEl;
    }
    measureEl = document.createElement("div");
    measureEl.className = "novel-text novel-text-measure";
    frameEl.appendChild(measureEl);
    return measureEl;
  }

  function normalizeDialogueItem(item) {
    if (typeof item === "string") {
      return { speaker: "", text: item };
    }
    if (!item || typeof item !== "object") {
      return null;
    }
    const speaker = replaceProtagonistLabel(item.speaker_name || item.speaker || item.name || "");
    const text = replaceProtagonistLabel(item.text || item.dialogue_text || item.line || "");
    if (!text) {
      return null;
    }
    return { speaker, text };
  }

  function replaceProtagonistLabel(value) {
    const text = String(value || "");
    if (!text) {
      return "";
    }
    if (!protagonistName || protagonistName === "主人公") {
      return text;
    }
    return text.replaceAll("主人公", protagonistName);
  }

  function buildChunks(scene) {
    const dialogues = Array.isArray(scene?.dialogues) ? scene.dialogues : [];
    return dialogues.map(normalizeDialogueItem).filter(Boolean);
  }

  function updateProgress() {
    const total = chunks.length;
    progressEl.textContent = total ? `${Math.min(cursor + 1, total)} / ${total}` : "0 / 0";
  }

  function updateChoices(choiceList) {
    if (!choiceList.length) {
      choicesEl.innerHTML = "";
      return;
    }
    choicesEl.innerHTML = choiceList.map((choice) => `
      <button type="button" class="btn btn-outline-light text-start w-100">
        ${NovelUI.escape(choice.choice_text || choice.text || "選択肢")}
      </button>
    `).join("");
  }

  function getCurrentChunk() {
    return chunks[cursor] || null;
  }

  function splitChunkIntoPages(text) {
    const value = String(text || "");
    if (!value) {
      return [""];
    }

    const measurer = ensureMeasureElement();
    measurer.style.width = `${textEl.clientWidth}px`;
    const maxHeight = textEl.clientHeight;
    const pages = [];
    let start = 0;

    while (start < value.length) {
      let low = start + 1;
      let high = value.length;
      let best = start + 1;

      while (low <= high) {
        const mid = Math.floor((low + high) / 2);
        measurer.textContent = value.slice(start, mid);
        if (measurer.scrollHeight <= maxHeight + 1) {
          best = mid;
          low = mid + 1;
        } else {
          high = mid - 1;
        }
      }

      if (best < value.length) {
        const pageText = value.slice(start, best);
        const preferredBreak = Math.max(
          pageText.lastIndexOf("\n"),
          pageText.lastIndexOf("。"),
          pageText.lastIndexOf("！"),
          pageText.lastIndexOf("？"),
          pageText.lastIndexOf("」"),
        );
        if (preferredBreak > pageText.length * 0.55) {
          best = start + preferredBreak + 1;
        }
      }

      const nextPage = value.slice(start, best).trimStart();
      pages.push(nextPage);
      start = best;
    }

    const filtered = pages.filter(Boolean);
    return filtered.length ? filtered : [value];
  }

  function getCurrentPageText() {
    return currentPages[pageCursor] || "";
  }

  function renderChunkText() {
    const current = getCurrentChunk();
    if (!current) {
      speakerEl.hidden = true;
      speakerEl.textContent = "";
      textEl.textContent = "表示できる本文がまだありません。";
      hintEl.textContent = "先にシーン本文を作成してください";
      updateProgress();
      return;
    }

    const speaker = current.speaker || "";
    speakerEl.hidden = !speaker;
    speakerEl.textContent = speaker;

    const currentPageText = getCurrentPageText();
    textEl.textContent = currentPageText.slice(0, revealedLength);

    if (revealedLength < currentPageText.length) {
      hintEl.textContent = "Enter で全文表示";
    } else if (pageCursor < currentPages.length - 1) {
      hintEl.textContent = "Enter で次のページへ";
    } else {
      hintEl.textContent = "Enter で次の文へ";
    }

    updateProgress();
  }

  function startTyping() {
    stopTyping();
    const current = getCurrentChunk();
    if (!current) {
      renderChunkText();
      return;
    }

    currentPages = splitChunkIntoPages(current.text);
    if (pageCursor >= currentPages.length) {
      pageCursor = 0;
    }

    revealedLength = 0;
    const text = getCurrentPageText();
    const step = () => {
      revealedLength = Math.min(revealedLength + 3, text.length);
      renderChunkText();
      if (revealedLength < text.length) {
        typingTimer = window.setTimeout(step, 24);
      } else {
        typingTimer = null;
      }
    };
    step();
  }

  function advanceText() {
    const current = getCurrentChunk();
    if (!current) {
      return;
    }

    const currentPageText = getCurrentPageText();
    if (revealedLength < currentPageText.length) {
      stopTyping();
      revealedLength = currentPageText.length;
      renderChunkText();
      return;
    }

    if (pageCursor < currentPages.length - 1) {
      pageCursor += 1;
      startTyping();
      return;
    }

    if (cursor < chunks.length - 1) {
      cursor += 1;
      pageCursor = 0;
      startTyping();
      return;
    }

    NovelUI.toast("このシーンの末尾です。", "info");
  }

  async function loadPreview() {
    const previewPayload = await NovelUI.api(`/api/v1/scenes/${sceneId}/preview`);
    const projectId = previewPayload?.project?.id;
    if (projectId) {
      try {
        const outlinePayload = await NovelUI.api(`/api/v1/projects/${projectId}/story-outline`);
        protagonistName = String(outlinePayload?.story_outline?.protagonist_name || "主人公").trim() || "主人公";
      } catch (_) {
        protagonistName = "主人公";
      }
    } else {
      protagonistName = "主人公";
    }
    chunks = buildChunks(previewPayload.scene || {});
    cursor = 0;
    pageCursor = 0;
    updateChoices(Array.isArray(previewPayload.scene?.choices) ? previewPayload.scene.choices : []);

    const image = previewPayload.scene?.image;
    if (image?.asset?.media_url) {
      heroEl.innerHTML = `<img src="${image.asset.media_url}" alt="scene preview image">`;
    } else {
      heroEl.innerHTML = `<div class="novel-preview-empty">プレビュー用画像がまだありません。</div>`;
    }

    startTyping();
    frameEl.focus();
  }

  nextButton.addEventListener("click", advanceText);
  frameEl.addEventListener("click", advanceText);
  textboxToggleButton.addEventListener("click", (event) => {
    event.stopPropagation();
    setTextboxVisible(!textboxVisible);
    frameEl.focus();
  });
  window.addEventListener("keydown", (event) => {
    if (event.key.toLowerCase() === "t") {
      event.preventDefault();
      setTextboxVisible(!textboxVisible);
      return;
    }
    if (event.key !== "Enter") {
      return;
    }
    const activeTag = document.activeElement?.tagName || "";
    if (["INPUT", "TEXTAREA", "SELECT", "BUTTON"].includes(activeTag)) {
      return;
    }
    event.preventDefault();
    advanceText();
  });

  loadPreview().catch((error) => {
    NovelUI.toast(error.message || "プレビューの読み込みに失敗しました。", "danger");
  });
})();
</script>
{% endblock %}
