{% extends "base.html" %}
{% block content %}
<section class="page-grid" data-project-home="{{ project_id }}">
  <div class="hero-panel">
    <div>
      <div class="eyebrow">Project Hub</div>
      <div class="d-flex flex-wrap align-items-start justify-content-between gap-3">
        <div>
          <h2 class="section-title" id="projectHomeTitle">プロジェクト情報を読み込み中...</h2>
          <p class="section-copy" id="projectHomeSummary">キャラクター、世界観、ライブチャットの起点になる画面です。</p>
          <div class="d-flex flex-wrap gap-2 mt-3" id="projectMetaChips"></div>
        </div>
        <div class="d-flex flex-wrap gap-2">
          <button class="btn btn-light" type="button" id="projectEditToggleButton">プロジェクト情報を編集</button>
          <a class="btn btn-outline-light" href="/projects/{{ project_id }}/live-chat">
            <i class="bi bi-chat-dots"></i>
            <span>ライブチャットへ</span>
          </a>
        </div>
      </div>

      <form id="projectEditForm" class="row g-3 mt-3" hidden>
        <div class="col-lg-7 col-md-8">
          <label class="form-label" for="projectTitleInput">作品名</label>
          <input class="form-control" id="projectTitleInput" name="title" placeholder="作品名" required>
        </div>
        <div class="col-lg-3 col-md-4">
          <label class="form-label" for="projectStatusSelect">ステータス</label>
          <select class="form-select" id="projectStatusSelect" name="status">
            <option value="draft">下書き</option>
            <option value="published">公開</option>
          </select>
        </div>
        <div class="col-12">
          <label class="form-label" for="projectSummaryInput">説明</label>
          <textarea class="form-control" id="projectSummaryInput" name="summary" rows="4" placeholder="プロジェクトの説明や利用者向けのメモを入力"></textarea>
        </div>
        <div class="col-12 d-flex justify-content-end gap-2">
          <button class="btn btn-outline-dark" type="button" id="projectEditCancelButton">閉じる</button>
          <button class="btn btn-sunrise" type="submit">保存</button>
        </div>
      </form>
    </div>
  </div>

  <div class="stats-row" id="projectStatsRow"></div>

  <div class="content-grid">
    <section class="panel-card span-7">
      <div class="panel-head">
        <h3>最近のライブチャットセッション</h3>
      </div>
      <div class="list-stack" id="recentLiveChatList"></div>
    </section>
    <section class="panel-card span-5">
      <div class="panel-head">
        <h3>主な操作</h3>
      </div>
      <div class="quick-actions quick-actions-tall">
        <button class="quick-link text-start border-0 w-100" type="button" id="projectQuickEditButton">
          <i class="bi bi-pencil-square"></i><span>プロジェクト情報を編集</span>
        </button>
        <a class="quick-link" href="/projects/{{ project_id }}/characters"><i class="bi bi-people"></i><span>キャラクター管理</span></a>
        <a class="quick-link" href="/projects/{{ project_id }}/world"><i class="bi bi-globe2"></i><span>世界観設定</span></a>
        <a class="quick-link" href="/projects/{{ project_id }}/live-chat"><i class="bi bi-chat-dots"></i><span>ライブチャット</span></a>
      </div>
    </section>
  </div>
</section>
{% endblock %}
{% block scripts %}
<script>
(() => {
  const projectId = Number({{ project_id }});
  const editToggleButton = document.getElementById("projectEditToggleButton");
  const quickEditButton = document.getElementById("projectQuickEditButton");
  const editCancelButton = document.getElementById("projectEditCancelButton");
  const editForm = document.getElementById("projectEditForm");
  const titleInput = document.getElementById("projectTitleInput");
  const summaryInput = document.getElementById("projectSummaryInput");
  const projectStatusSelect = document.getElementById("projectStatusSelect");
  const params = new URLSearchParams(window.location.search);

  function setEditVisible(visible) {
    editForm.hidden = !visible;
    editToggleButton.textContent = visible ? "編集中" : "プロジェクト情報を編集";
    if (visible) {
      titleInput.focus();
      titleInput.select();
    }
  }

  function normalizeProjectStatus(status) {
    return status === "published" || status === "active" ? "published" : "draft";
  }

  function statusLabel(status) {
    return normalizeProjectStatus(status) === "published" ? "公開" : "下書き";
  }

  function renderMetaChips(project) {
    const chips = [`ステータス: ${statusLabel(project?.status)}`];
    document.getElementById("projectMetaChips").innerHTML = chips
      .map((item) => `<span class="soft-code">${NovelUI.escape(item)}</span>`)
      .join("");
  }

  async function loadOverview() {
    const [project, characters, sessions] = await Promise.all([
      NovelUI.api(`/api/v1/projects/${projectId}`),
      NovelUI.api(`/api/v1/projects/${projectId}/characters`),
      NovelUI.api(`/api/v1/chat/sessions?project_id=${projectId}`),
    ]);

    const characterList = Array.isArray(characters) ? characters : [];
    const sessionList = Array.isArray(sessions) ? sessions : [];

    document.getElementById("projectHomeTitle").textContent = project?.title || "Untitled";
    document.getElementById("projectHomeSummary").textContent =
      project?.summary || "キャラクター、世界観、ライブチャットの起点になる画面です。";
    renderMetaChips(project);

    titleInput.value = project?.title || "";
    summaryInput.value = project?.summary || "";
    projectStatusSelect.value = normalizeProjectStatus(project?.status);

    document.getElementById("projectStatsRow").innerHTML = [
      ["キャラクター", characterList.length],
      ["ライブチャット", sessionList.length],
      ["ステータス", statusLabel(project?.status)],
    ].map(([label, value]) => `
      <article class="metric-card"><div class="metric-label">${NovelUI.escape(label)}</div><div class="metric-value">${NovelUI.escape(String(value))}</div></article>
    `).join("");

    const recentList = sessionList
      .slice()
      .sort((a, b) => String(b.updated_at || "").localeCompare(String(a.updated_at || "")))
      .slice(0, 5);

    document.getElementById("recentLiveChatList").innerHTML = recentList.length ? recentList.map((item) => `
      <a class="list-row" href="/projects/${projectId}/live-chat/${item.id}">
        <div>
          <div class="list-title">${NovelUI.escape(item.title || "ライブチャットセッション")}</div>
          <div class="list-subtitle">${NovelUI.escape(item.last_message_text || "まだ会話メッセージがありません。")}</div>
        </div>
        <span class="soft-code">${NovelUI.escape(String(item.message_count || 0))} messages</span>
      </a>
      `).join("") : `<div class="empty-panel">まだライブチャットセッションがありません。</div>`;
  }

  editToggleButton.addEventListener("click", () => {
    setEditVisible(editForm.hidden);
  });

  quickEditButton.addEventListener("click", () => {
    setEditVisible(true);
  });

  editCancelButton.addEventListener("click", () => {
    setEditVisible(false);
  });

  editForm.addEventListener("submit", async (event) => {
    event.preventDefault();
    const body = {
      title: titleInput.value.trim(),
      summary: summaryInput.value.trim(),
      status: projectStatusSelect.value,
    };

    if (!body.title) {
      NovelUI.toast("作品名を入力してください。", "warning");
      titleInput.focus();
      return;
    }

    try {
      await NovelUI.api(`/api/v1/projects/${projectId}`, { method: "PATCH", body });
      setEditVisible(false);
      params.delete("edit");
      const nextUrl = `${window.location.pathname}${params.toString() ? `?${params.toString()}` : ""}`;
      window.history.replaceState({}, "", nextUrl);
      await loadOverview();
      NovelUI.toast("プロジェクト情報を更新しました。");
    } catch (error) {
      NovelUI.toast(error.message || "プロジェクト情報の更新に失敗しました。", "danger");
    }
  });

  loadOverview().then(() => {
    if (params.get("edit") === "1") {
      setEditVisible(true);
    }
  }).catch((error) => {
    NovelUI.toast(error.message || "プロジェクトホームの読み込みに失敗しました。", "danger");
  });
})();
</script>
{% endblock %}
