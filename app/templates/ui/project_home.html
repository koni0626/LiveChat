{% extends "base.html" %}
{% block content %}
<section class="page-grid" data-project-home="{{ project_id }}">
  <div class="hero-panel">
    <div>
      <div class="eyebrow">Project Hub</div>
      <div class="d-flex flex-wrap align-items-start justify-content-between gap-3">
        <div>
          <h2 class="section-title" id="projectHomeTitle">作品情報を読み込み中...</h2>
          <p class="section-copy" id="projectHomeSummary">制作全体の進行と次の一手をここで整理します。</p>
        </div>
        <button class="btn btn-light" type="button" id="projectEditToggleButton">作品名を変更</button>
      </div>
      <form id="projectEditForm" class="row g-2 mt-3" hidden>
        <div class="col-md-5">
          <label class="form-label" for="projectTitleInput">作品名</label>
          <input class="form-control" id="projectTitleInput" name="title" placeholder="作品名">
        </div>
        <div class="col-md-7">
          <label class="form-label" for="projectSummaryInput">概要</label>
          <input class="form-control" id="projectSummaryInput" name="summary" placeholder="概要">
        </div>
        <div class="col-12 d-flex justify-content-end gap-2">
          <button class="btn btn-outline-dark" type="button" id="projectEditCancelButton">閉じる</button>
          <button class="btn btn-sunrise" type="submit">保存</button>
        </div>
      </form>
    </div>
  </div>
  <div class="stats-row" id="projectStatsRow"></div>
  <div class="content-grid">
    <section class="panel-card span-7">
      <div class="panel-head"><h3>最近更新したシーン</h3></div>
      <div class="list-stack" id="recentSceneList"></div>
    </section>
    <section class="panel-card span-5">
      <div class="panel-head"><h3>編集メニュー</h3></div>
      <div class="quick-actions quick-actions-tall">
        <a class="quick-link" href="/projects/{{ project_id }}/characters"><i class="bi bi-people"></i><span>キャラクター編集</span></a>
        <a class="quick-link" href="/projects/{{ project_id }}/world"><i class="bi bi-globe2"></i><span>世界観設定</span></a>
        <a class="quick-link" href="/projects/{{ project_id }}/story-outline"><i class="bi bi-diagram-3"></i><span>ストーリー骨子</span></a>
        <a class="quick-link" href="/projects/{{ project_id }}/live-chat"><i class="bi bi-chat-dots"></i><span>ライブ会話</span></a>
        <a class="quick-link" href="/projects/{{ project_id }}/scenes"><i class="bi bi-film"></i><span>シーン編集</span></a>
        <a class="quick-link" href="/projects/{{ project_id }}/exports"><i class="bi bi-box-arrow-up-right"></i><span>エクスポート</span></a>
      </div>
    </section>
  </div>
</section>
{% endblock %}
{% block scripts %}
<script>
(() => {
  const projectId = Number({{ project_id }});
  const editToggleButton = document.getElementById("projectEditToggleButton");
  const editCancelButton = document.getElementById("projectEditCancelButton");
  const editForm = document.getElementById("projectEditForm");
  const titleInput = document.getElementById("projectTitleInput");
  const summaryInput = document.getElementById("projectSummaryInput");

  function setEditVisible(visible) {
    editForm.hidden = !visible;
    editToggleButton.textContent = visible ? "編集中" : "作品名を変更";
    if (visible) {
      titleInput.focus();
      titleInput.select();
    }
  }

  async function loadOverview() {
    const overview = await NovelUI.api(`/api/v1/projects/${projectId}/overview`);
    document.getElementById("projectHomeTitle").textContent = overview.project?.title || "Untitled";
    document.getElementById("projectHomeSummary").textContent = overview.project?.summary || "概要はまだありません。";
    titleInput.value = overview.project?.title || "";
    summaryInput.value = overview.project?.summary || "";
    document.getElementById("projectStatsRow").innerHTML = [
      ["Characters", overview.stats?.character_count ?? 0],
      ["Scenes", overview.stats?.scene_count ?? 0],
      ["Branches", overview.stats?.branch_count ?? 0],
      ["Need Images", overview.stats?.ungenerated_image_count ?? 0],
    ].map(([label, value]) => `
      <article class="metric-card"><div class="metric-label">${label}</div><div class="metric-value">${value}</div></article>
    `).join("");
    const list = overview.recent_scenes || [];
    document.getElementById("recentSceneList").innerHTML = list.length ? list.map((scene) => `
      <a class="list-row" href="/projects/${projectId}/scenes?scene_id=${scene.id}">
        <div>
          <div class="list-title">${NovelUI.escape(scene.title || "無題シーン")}</div>
          <div class="list-subtitle">${NovelUI.escape(scene.summary || "概要なし")}</div>
        </div>
        <span class="soft-code">${scene.is_fixed ? "fixed" : "editable"}</span>
      </a>
    `).join("") : `<div class="empty-panel">まだ更新されたシーンがありません。</div>`;
  }

  editToggleButton.addEventListener("click", () => {
    setEditVisible(editForm.hidden);
  });

  editCancelButton.addEventListener("click", () => {
    setEditVisible(false);
  });

  editForm.addEventListener("submit", async (event) => {
    event.preventDefault();
    const body = {
      title: titleInput.value.trim(),
      summary: summaryInput.value.trim(),
    };
    if (!body.title) {
      NovelUI.toast("作品名を入力してください。", "warning");
      titleInput.focus();
      return;
    }
    try {
      await NovelUI.api(`/api/v1/projects/${projectId}`, { method: "PATCH", body });
      setEditVisible(false);
      await loadOverview();
      NovelUI.toast("作品情報を更新しました。");
    } catch (error) {
      NovelUI.toast(error.message || "作品情報の更新に失敗しました。", "danger");
    }
  });

  loadOverview().catch((error) => NovelUI.toast(error.message || "作品概要の取得に失敗しました。", "danger"));
})();
</script>
{% endblock %}
