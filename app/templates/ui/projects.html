{% extends "base.html" %}
{% block content %}
<section class="page-grid" data-project-list-page data-can-manage-worlds="{{ 'true' if current_user_role in ['superuser', 'project_user'] else 'false' }}">
  <div class="toolbar-panel">
    <form class="row g-3 align-items-end" id="projectSearchForm">
      <div class="col-md-6">
        <label class="form-label" for="projectSearchInput">検索</label>
        <input class="form-control" id="projectSearchInput" type="text" name="search" placeholder="ワールド名や説明で検索">
      </div>
      <div class="col-md-3">
        <label class="form-label" for="projectStatusSelect">ステータス</label>
        <select class="form-select" id="projectStatusSelect" name="status">
          <option value="">すべて</option>
          <option value="draft">下書き</option>
          <option value="published">公開</option>
        </select>
      </div>
      <div class="col-md-3 d-flex gap-2">
        <button class="btn btn-dark w-100" type="submit">検索</button>
        {% if current_user_role in ["superuser", "project_user"] %}
        <a class="btn btn-sunrise w-100" href="{{ url_for('ui.project_create_page') }}">新規作成</a>
        {% endif %}
      </div>
    </form>
  </div>

  <section class="panel-card world-carousel-panel">
    <div class="panel-head">
      <h3>ワールド一覧</h3>
      <div class="world-carousel-head-actions">
        <span class="soft-code" id="projectCountLabel">0 items</span>
        <div class="world-carousel-controls" aria-label="ワールドカルーセル操作">
          <button class="world-carousel-button" type="button" id="worldCarouselPrev" aria-label="前のワールド">
            <i class="bi bi-chevron-left"></i>
          </button>
          <button class="world-carousel-button" type="button" id="worldCarouselNext" aria-label="次のワールド">
            <i class="bi bi-chevron-right"></i>
          </button>
        </div>
      </div>
    </div>
    <div class="world-carousel-viewport" id="worldCarouselViewport">
      <div class="world-carousel-track" id="projectList"></div>
    </div>
  </section>
</section>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/project_list_page.js') }}"></script>
{% endblock %}
