{% extends "base.html" %}
{% block content %}
<section class="page-grid">
  <div class="toolbar-panel">
    <form class="row g-3 align-items-end" id="projectSearchForm">
      <div class="col-md-6">
        <label class="form-label" for="projectSearchInput">検索</label>
        <input class="form-control" id="projectSearchInput" type="text" name="search" placeholder="ワールド名や説明で検索">
      </div>
      <div class="col-md-3">
        <label class="form-label" for="projectStatusSelect">ステータス</label>
        <select class="form-select" id="projectStatusSelect" name="status">
          <option value="">すべて</option>
          <option value="draft">下書き</option>
          <option value="published">公開</option>
        </select>
      </div>
      <div class="col-md-3 d-flex gap-2">
        <button class="btn btn-dark w-100" type="submit">検索</button>
        {% if current_user_role in ["superuser", "project_user"] %}
        <a class="btn btn-sunrise w-100" href="{{ url_for('ui.project_create_page') }}">新規作成</a>
        {% endif %}
      </div>
    </form>
  </div>

  <section class="panel-card world-carousel-panel">
    <div class="panel-head">
      <h3>ワールド一覧</h3>
      <div class="world-carousel-head-actions">
        <span class="soft-code" id="projectCountLabel">0 items</span>
        <div class="world-carousel-controls" aria-label="ワールドカルーセル操作">
          <button class="world-carousel-button" type="button" id="worldCarouselPrev" aria-label="前のワールド">
            <i class="bi bi-chevron-left"></i>
          </button>
          <button class="world-carousel-button" type="button" id="worldCarouselNext" aria-label="次のワールド">
            <i class="bi bi-chevron-right"></i>
          </button>
        </div>
      </div>
    </div>
    <div class="world-carousel-viewport" id="worldCarouselViewport">
      <div class="world-carousel-track" id="projectList"></div>
    </div>
  </section>
</section>
{% endblock %}
{% block scripts %}
<script>
(() => {
  const canManageWorlds = {{ "true" if current_user_role in ["superuser", "project_user"] else "false" }};
  const form = document.getElementById("projectSearchForm");
  const viewport = document.getElementById("worldCarouselViewport");
  const host = document.getElementById("projectList");
  const countLabel = document.getElementById("projectCountLabel");
  const prevButton = document.getElementById("worldCarouselPrev");
  const nextButton = document.getElementById("worldCarouselNext");

  function statusLabel(status) {
    return status === "published" || status === "active" ? "公開" : "下書き";
  }

  function renderWorldImage(project) {
    const mediaUrl = project.thumbnail_asset?.media_url;
    if (mediaUrl) {
      return `<img class="world-card-image" src="${mediaUrl}" alt="${NovelUI.escape(project.title || "ワールド看板")}">`;
    }
    return `<div class="world-card-placeholder"><i class="bi bi-image"></i><span>看板画像なし</span></div>`;
  }

  function updateCarouselButtons() {
    const hasOverflow = viewport.scrollWidth > viewport.clientWidth + 4;
    prevButton.disabled = !hasOverflow || viewport.scrollLeft <= 4;
    nextButton.disabled = !hasOverflow || viewport.scrollLeft + viewport.clientWidth >= viewport.scrollWidth - 4;
  }

  function scrollCarousel(direction) {
    const firstCard = host.querySelector(".project-card");
    const cardWidth = firstCard ? firstCard.getBoundingClientRect().width : viewport.clientWidth * 0.8;
    viewport.scrollBy({ left: direction * (cardWidth + 24), behavior: "smooth" });
  }

  async function loadProjects() {
    const params = new URLSearchParams();
    const formData = new FormData(form);
    for (const [key, value] of formData.entries()) {
      if (value) {
        params.set(key, value);
      }
    }

    const suffix = params.toString() ? `?${params.toString()}` : "";
    const data = await NovelUI.api(`/api/v1/projects${suffix}`);
    const list = Array.isArray(data) ? data : [];
    countLabel.textContent = `${list.length} items`;
    viewport.scrollTo({ left: 0 });

    if (!list.length) {
      host.innerHTML = `<div class="empty-panel world-carousel-empty">条件に合うワールドがありません。</div>`;
      updateCarouselButtons();
      return;
    }

    host.innerHTML = list.map((project) => `
      <article class="project-card world-carousel-card">
        ${renderWorldImage(project)}
        <div class="project-card-top">
          <span class="soft-code">${NovelUI.escape(statusLabel(project.status))}</span>
        </div>
        <h4>${NovelUI.escape(project.title || "Untitled")}</h4>
        <p>${NovelUI.escape(project.summary || "説明はまだありません。")}</p>
        <div class="d-flex justify-content-between align-items-center mt-3">
          <a class="btn btn-sm btn-dark" href="/projects/${project.id}/live-chat">ルームへ</a>
          ${canManageWorlds ? `<button class="btn btn-sm btn-outline-danger" data-project-delete="${project.id}">削除</button>` : ""}
        </div>
      </article>
    `).join("");
    requestAnimationFrame(updateCarouselButtons);
  }

  form.addEventListener("submit", (event) => {
    event.preventDefault();
    loadProjects().catch((error) => {
      NovelUI.toast(error.message || "ワールド一覧の読み込みに失敗しました。", "danger");
    });
  });

  host.addEventListener("click", async (event) => {
    const button = event.target.closest("[data-project-delete]");
    if (!button) {
      return;
    }
    if (!window.confirm("このワールドを削除しますか？")) {
      return;
    }
    try {
      await NovelUI.api(`/api/v1/projects/${button.dataset.projectDelete}`, { method: "DELETE" });
      NovelUI.toast("ワールドを削除しました。");
      await loadProjects();
    } catch (error) {
      NovelUI.toast(error.message || "削除に失敗しました。", "danger");
    }
  });

  prevButton.addEventListener("click", () => scrollCarousel(-1));
  nextButton.addEventListener("click", () => scrollCarousel(1));
  viewport.addEventListener("scroll", () => requestAnimationFrame(updateCarouselButtons));
  window.addEventListener("resize", () => requestAnimationFrame(updateCarouselButtons));

  loadProjects().catch((error) => {
    NovelUI.toast(error.message || "ワールド一覧の読み込みに失敗しました。", "danger");
  });
})();
</script>
{% endblock %}
