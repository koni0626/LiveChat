{% extends "base.html" %}
{% block content %}
<section class="page-grid">
  <div class="hero-panel">
    <div>
      <div class="eyebrow">Dashboard</div>
      <h2 class="section-title">制作中の作品へ、最短で戻る</h2>
      <p class="section-copy">最近触った作品、次に進めるべき導線、制作の温度感をひと目で把握できるホーム画面です。</p>
    </div>
    <div class="hero-actions">
      <a href="{{ url_for('ui.project_create_page') }}" class="btn btn-sunrise">
        <i class="bi bi-plus-lg"></i><span>新規作品作成</span>
      </a>
      <a href="{{ url_for('ui.project_list_page') }}" class="btn btn-outline-light">
        <i class="bi bi-collection"></i><span>作品一覧</span>
      </a>
    </div>
  </div>

  <div class="stats-row">
    <article class="metric-card">
      <div class="metric-label">Recent Works</div>
      <div class="metric-value" id="dashboardProjectCount">0</div>
    </article>
    <article class="metric-card">
      <div class="metric-label">Image Mode</div>
      <div class="metric-value">low</div>
    </article>
    <article class="metric-card">
      <div class="metric-label">Text Model</div>
      <div class="metric-value">GPT</div>
    </article>
  </div>

  <div class="content-grid">
    <section class="panel-card span-8">
      <div class="panel-head">
        <h3>最近の作品</h3>
        <a class="btn btn-sm btn-outline-dark" href="{{ url_for('ui.project_list_page') }}">すべて見る</a>
      </div>
      <div class="project-card-grid" id="recentProjects"></div>
    </section>
    <section class="panel-card span-4">
      <div class="panel-head"><h3>Quick Start</h3></div>
      <div class="quick-actions">
        <a class="quick-link" href="{{ url_for('ui.project_create_page') }}"><i class="bi bi-stars"></i><span>新規タイトルを立ち上げる</span></a>
        <a class="quick-link" href="{{ url_for('ui.settings_page') }}"><i class="bi bi-sliders"></i><span>モデル設定を見る</span></a>
        <a class="quick-link" href="/health"><i class="bi bi-heart-pulse"></i><span>環境状態を確認する</span></a>
      </div>
    </section>
  </div>
</section>
{% endblock %}
{% block scripts %}
<script>
(() => {
  async function loadDashboard() {
    const projects = await NovelUI.api("/api/v1/projects");
    const list = Array.isArray(projects) ? projects : [];
    document.getElementById("dashboardProjectCount").textContent = String(list.length);
    const host = document.getElementById("recentProjects");
    if (!list.length) {
      host.innerHTML = `<div class="empty-panel">まだ作品がありません。最初の1本をここから始めましょう。</div>`;
      return;
    }
    host.innerHTML = list.slice(0, 6).map((project) => `
      <a class="project-card" href="/projects/${project.id}/home">
        <div class="project-card-top">
          <span class="badge text-bg-light">${project.genre || "genre"}</span>
          <span class="soft-code">${project.status || "draft"}</span>
        </div>
        <h4>${NovelUI.escape(project.title || "Untitled")}</h4>
        <p>${NovelUI.escape(project.summary || "概要はまだありません。")}</p>
      </a>
    `).join("");
  }
  loadDashboard().catch((error) => NovelUI.toast(error.message || "ダッシュボードの読込に失敗しました。", "danger"));
})();
</script>
{% endblock %}
