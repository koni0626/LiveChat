{% extends "base.html" %}
{% block content %}
<section class="page-grid closet-page">
  <section class="panel-card closet-hero">
    <div>
      <div class="eyebrow">Closet</div>
      <h2>キャラクターの衣装管理</h2>
      <p>チャット、ストーリー、おでかけ、画像生成で共通して使う衣装をキャラクター単位で保存します。</p>
    </div>
    <button class="btn btn-outline-light btn-sm" type="button" id="closetRefreshButton">
      <i class="bi bi-arrow-clockwise"></i>
      更新
    </button>
  </section>

  <section class="closet-layout">
    <section class="panel-card closet-main">
      <div class="panel-head">
        <div>
          <h3>クローゼット</h3>
          <span class="soft-code" id="closetCount">0 outfits</span>
        </div>
        <button class="btn btn-sunrise btn-sm" type="button" id="closetNewOutfitButton">
          <i class="bi bi-plus-lg"></i>
          新規追加
        </button>
      </div>
      <div class="closet-filter-row">
        <select class="form-select" id="closetFilterCharacter"></select>
      </div>
      <div class="closet-loading d-none" id="closetLoading">
        <div class="spinner-border spinner-border-sm" aria-hidden="true"></div>
        <span>読み込み中です。</span>
      </div>
      <div class="closet-grid" id="closetGrid"></div>
    </section>
  </section>
</section>

<div class="modal fade" id="closetDetailModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content closet-detail-modal">
      <div class="modal-header">
        <div>
          <div class="eyebrow">Outfit Detail</div>
          <h5 class="modal-title" id="closetDetailModalTitle">衣装情報</h5>
        </div>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="閉じる"></button>
      </div>
      <div class="modal-body">
        <div class="closet-detail-layout">
          <div class="closet-detail-preview">
            <img id="closetDetailPreviewImage" alt="">
            <div class="closet-detail-preview-empty" id="closetDetailPreviewEmpty">画像を生成すると、ここにプレビューが表示されます。</div>
          </div>
          <form id="closetGeneratedSaveForm" class="stacked-form">
            <div id="closetDetailCreateFields">
              <label class="form-label" for="closetDetailCharacterSelect">キャラクター</label>
              <select class="form-select" id="closetDetailCharacterSelect" name="character_id"></select>
            </div>

            <label class="form-label mt-3" for="closetDetailPromptInput">衣装生成プロンプト</label>
            <textarea class="form-control" id="closetDetailPromptInput" name="prompt_text" rows="4" placeholder="例: 黒いミニワンピース。胸元は上品に、細いシルバーのアクセサリー。夜景デート向け。"></textarea>

            <label class="form-label mt-3" for="closetGeneratedNameInput">衣装名</label>
            <input class="form-control" id="closetGeneratedNameInput" name="name" maxlength="255" placeholder="例: 夜景デートの黒ワンピース">

            <label class="form-label mt-3" for="closetGeneratedDescriptionInput">説明</label>
            <textarea class="form-control" id="closetGeneratedDescriptionInput" name="description" rows="4" placeholder="服の形、素材、印象など"></textarea>

            <div class="row g-2 mt-1">
              <div class="col-6">
                <label class="form-label" for="closetGeneratedUsageSelect">用途</label>
                <select class="form-select" id="closetGeneratedUsageSelect" name="usage_scene">
                  <option value="">未指定</option>
                  <option value="daily">普段着</option>
                  <option value="date">デート</option>
                  <option value="story">ストーリー</option>
                  <option value="formal">フォーマル</option>
                  <option value="battle">戦闘</option>
                </select>
              </div>
              <div class="col-6">
                <label class="form-label" for="closetGeneratedSeasonSelect">季節</label>
                <select class="form-select" id="closetGeneratedSeasonSelect" name="season">
                  <option value="">未指定</option>
                  <option value="all">通年</option>
                  <option value="spring">春</option>
                  <option value="summer">夏</option>
                  <option value="autumn">秋</option>
                  <option value="winter">冬</option>
                </select>
              </div>
            </div>

            <label class="form-label mt-3" for="closetGeneratedTagsInput">タグ</label>
            <input class="form-control" id="closetGeneratedTagsInput" name="tags" placeholder="カジュアル, 白, デート">

            <button class="btn btn-outline-light w-100 mt-4" type="button" id="closetGenerateImageButton">
              <span class="spinner-border spinner-border-sm d-none" id="closetGenerateImageSpinner" aria-hidden="true"></span>
              <i class="bi bi-stars"></i>
              <span id="closetGenerateImageButtonText">画像を生成</span>
            </button>

            <button class="btn btn-sunrise w-100 mt-2" type="submit" id="closetGeneratedSaveButton">
              <i class="bi bi-check2"></i>
              <span id="closetGeneratedSaveButtonText">この画像を衣装として保存</span>
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/closet_page.js') }}"></script>
{% endblock %}
