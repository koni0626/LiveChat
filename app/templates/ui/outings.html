{% extends "base.html" %}
{% block content %}
<section class="page-grid outing-page">
  <section class="panel-card outing-hero">
    <div>
      <div class="eyebrow">Outing</div>
      <h2>キャラクターと施設へ出かける</h2>
      <p>今日はどこへ寄り道しよう。街の空気、相手の表情、そこでしか起きない小さな時間。</p>
    </div>
    <button class="btn btn-outline-light btn-sm" type="button" id="outingRefreshButton">
      <i class="bi bi-arrow-clockwise"></i>
      更新
    </button>
  </section>

  <section class="outing-layout">
    <aside class="panel-card outing-start-panel">
      <div class="panel-head">
        <h3>誘う</h3>
        <span class="soft-code">mini event</span>
      </div>
      <form id="outingStartForm" class="stacked-form">
        <label class="form-label" for="outingCharacterSelect">キャラクター</label>
        <select class="form-select" id="outingCharacterSelect" name="character_id" required></select>

        <label class="form-label mt-3" for="outingLocationSelect">行き先</label>
        <select class="form-select" id="outingLocationSelect" name="location_id" required></select>

        <label class="form-label mt-3" for="outingOutfitSelect">衣装</label>
        <select class="form-select" id="outingOutfitSelect" name="outfit_id">
          <option value="auto">おまかせ</option>
          <option value="base">基準画像</option>
        </select>

        <label class="form-label mt-3" for="outingMoodInput">雰囲気</label>
        <input class="form-control" id="outingMoodInput" name="mood" maxlength="100" placeholder="例: 放課後の寄り道、静かなデート、少し照れた雰囲気">

        <button class="btn btn-sunrise w-100 mt-4" type="submit" id="outingStartButton">
          <i class="bi bi-signpost-split"></i>
          誘う
        </button>
      </form>
    </aside>

    <section class="panel-card outing-main-panel">
      <div class="panel-head">
        <h3 id="outingTitle">おでかけ</h3>
        <div class="outing-main-head-tools">
          <span class="soft-code" id="outingStatus">standby</span>
          <button class="btn btn-sm btn-outline-light" type="button" id="outingToggleTextboxButton" aria-expanded="true">テキストボックス非表示</button>
        </div>
      </div>
      <div class="outing-loading d-none" id="outingLoading" role="status" aria-live="polite">
        <div class="spinner-border spinner-border-sm" aria-hidden="true"></div>
        <div>
          <strong id="outingLoadingTitle">準備中</strong>
          <p id="outingLoadingText">おでかけの場面を作っています。</p>
        </div>
      </div>
      <div id="outingCurrent"></div>
    </section>
  </section>

  <section class="panel-card">
    <div class="panel-head">
      <h3>おでかけギャラリー</h3>
      <span class="soft-code" id="outingGalleryCount">0 images</span>
    </div>
    <div class="outing-gallery-grid" id="outingGallery"></div>
  </section>

  <section class="panel-card">
    <div class="panel-head">
      <h3>思い出</h3>
      <span class="soft-code" id="outingHistoryCount">0 outings</span>
    </div>
    <div class="outing-history-grid" id="outingHistory"></div>
  </section>
</section>

<div class="modal fade" id="outingImageModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content outing-image-modal">
      <div class="modal-header">
        <div>
          <div class="eyebrow">Outing CG</div>
          <h5 class="modal-title" id="outingImageModalTitle">おでかけ画像</h5>
        </div>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="閉じる"></button>
      </div>
      <div class="modal-body">
        <img id="outingImageModalImage" alt="">
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/outings_page.js') }}"></script>
{% endblock %}
