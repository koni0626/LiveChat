{% extends "base.html" %}
{% block content %}
<section class="page-grid narrow-grid">
  <section class="panel-card">
    <div class="panel-head"><h3>エクスポート設定</h3></div>
    <form id="exportForm" class="row g-3">
      <div class="col-md-6">
        <label class="form-label" for="exportTypeSelect">出力形式</label>
        <select class="form-select" id="exportTypeSelect" name="export_type">
          <option value="html">HTML Game</option>
          <option value="json">JSON</option>
          <option value="text">TEXT</option>
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label" for="exportOptionsInput">オプション JSON</label>
        <input class="form-control font-mono-sm" id="exportOptionsInput" name="options_json" placeholder='{"include_images": true}'>
      </div>
      <div class="col-12 d-flex justify-content-end">
        <button class="btn btn-sunrise" type="submit">エクスポート実行</button>
      </div>
    </form>
  </section>

  <section class="panel-card">
    <div class="panel-head"><h3>エクスポート履歴</h3></div>
    <div class="list-stack" id="exportHistory"></div>
  </section>
</section>
{% endblock %}
{% block scripts %}
<script>
(() => {
  const projectId = Number({{ project_id }});

  async function loadExports() {
    const list = await NovelUI.api(`/api/v1/projects/${projectId}/exports`);
    const host = document.getElementById("exportHistory");
    if (!Array.isArray(list) || !list.length) {
      host.innerHTML = `<div class="empty-panel">エクスポート履歴はまだありません。</div>`;
      return;
    }

    host.innerHTML = list.map((item) => `
      <div class="list-row">
        <div>
          <div class="list-title">${NovelUI.escape(item.export_type || "export")}</div>
          <div class="list-subtitle">${NovelUI.escape(item.error_message || item.asset?.file_name || "")}</div>
        </div>
        <div class="d-flex align-items-center gap-2 flex-wrap justify-content-end">
          <span class="soft-code">${NovelUI.escape(item.status || "queued")}</span>
          ${item.asset?.media_url ? `<a class="btn btn-sm btn-outline-dark" href="${item.asset.media_url}" download>ダウンロード</a>` : ""}
        </div>
      </div>
    `).join("");
  }

  document.getElementById("exportForm").addEventListener("submit", async (event) => {
    event.preventDefault();
    const body = Object.fromEntries(new FormData(event.currentTarget).entries());
    try {
      await NovelUI.api(`/api/v1/projects/${projectId}/exports`, { method: "POST", body });
      NovelUI.toast("エクスポートを作成しました。");
      await loadExports();
    } catch (error) {
      NovelUI.toast(error.message || "エクスポートに失敗しました。", "danger");
    }
  });

  loadExports().catch((error) => {
    NovelUI.toast(error.message || "履歴の読み込みに失敗しました。", "danger");
  });
})();
</script>
{% endblock %}
