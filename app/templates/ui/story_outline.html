{% extends "base.html" %}
{% block content %}
<section class="editor-grid">
  <section class="panel-card">
    <div class="panel-head"><h3>ストーリー骨子</h3></div>
    <form id="outlineForm" class="vstack gap-3">
      <label class="form-label">前提 / premise</label><textarea class="form-control" name="premise" rows="4"></textarea>
      <label class="form-label">主人公名</label><input class="form-control" name="protagonist_name" placeholder="例: 春人">
      <label class="form-label">主人公の立場</label><textarea class="form-control" name="protagonist_position" rows="3"></textarea>
      <label class="form-label">主目的</label><textarea class="form-control" name="main_goal" rows="3"></textarea>
      <div class="row g-3">
        <div class="col-md-6"><label class="form-label">分岐方針</label><textarea class="form-control" name="branching_policy" rows="4"></textarea></div>
        <div class="col-md-6"><label class="form-label">エンディング方針</label><textarea class="form-control" name="ending_policy" rows="4"></textarea></div>
      </div>
      <label class="form-label">骨子本文</label><textarea class="form-control" name="outline_text" rows="8"></textarea>
      <div>
        <div class="form-label">AI章候補</div>
        <div id="outlineChapterSuggestions" class="mini-board">まだ候補はありません。</div>
      </div>
      <div class="d-flex gap-2 justify-content-end">
        <button class="btn btn-outline-dark" type="button" id="outlineGenerate">AIで骨子作成</button>
        <button class="btn btn-sunrise" type="submit">保存</button>
      </div>
    </form>
  </section>
  <section class="panel-card">
    <div class="panel-head"><h3>章一覧</h3></div>
    <div class="list-stack mb-3" id="chapterList"></div>
    <form id="chapterCreateForm" class="row g-2">
      <div class="col-md-2"><input class="form-control" type="number" name="chapter_no" placeholder="章番号"></div>
      <div class="col-md-6"><input class="form-control" name="title" placeholder="章タイトル"></div>
      <div class="col-md-4 d-grid"><button class="btn btn-dark" type="submit">章追加</button></div>
    </form>
  </section>
</section>
{% endblock %}
{% block scripts %}
<script>
(() => {
  const projectId = Number({{ project_id }});
  const outlineForm = document.getElementById("outlineForm");
  const chapterList = document.getElementById("chapterList");
  const chapterSuggestionHost = document.getElementById("outlineChapterSuggestions");
  const outlineGenerateButton = document.getElementById("outlineGenerate");
  const outlineGenerateDefaultLabel = outlineGenerateButton.textContent;

  function setOutlineGenerating(active) {
    outlineGenerateButton.disabled = active;
    outlineGenerateButton.textContent = active ? "生成中..." : outlineGenerateDefaultLabel;
  }

  function parseOutlineJson(value) {
    if (!value) return null;
    if (typeof value === "object") return value;
    try {
      return JSON.parse(value);
    } catch (_) {
      return null;
    }
  }

  function renderChapterSuggestions(outlineJson) {
    const chapters = parseOutlineJson(outlineJson)?.chapters || [];
    chapterSuggestionHost.innerHTML = chapters.length ? chapters.map((chapter) => `
      <div class="mb-3">
        <div class="fw-semibold">第${NovelUI.escape(chapter.chapter_no ?? "-")}章 ${NovelUI.escape(chapter.title || "章タイトル未設定")}</div>
        <div class="small text-secondary">${NovelUI.escape(chapter.summary || "")}</div>
        <div class="small">${NovelUI.escape(chapter.objective || "")}</div>
      </div>
    `).join("") : "まだ候補はありません。";
  }

  async function loadOutline() {
    const outlinePayload = await NovelUI.api(`/api/v1/projects/${projectId}/story-outline`);
    if (outlinePayload.story_outline) {
      NovelUI.fillForm(outlineForm, outlinePayload.story_outline);
      renderChapterSuggestions(outlinePayload.story_outline.outline_json);
    } else {
      renderChapterSuggestions(null);
    }

    const chapters = await NovelUI.api(`/api/v1/projects/${projectId}/chapters`);
    chapterList.innerHTML = Array.isArray(chapters) && chapters.length ? chapters.map((chapter) => `
      <div class="list-row">
        <div>
          <div class="list-title">第${chapter.chapter_no}章 ${NovelUI.escape(chapter.title)}</div>
          <div class="list-subtitle">${NovelUI.escape(chapter.summary || chapter.objective || "")}</div>
        </div>
        <div class="d-flex align-items-center gap-2">
          <span class="soft-code">sort ${chapter.sort_order}</span>
          <button class="btn btn-sm btn-outline-danger" type="button" data-delete-chapter="${chapter.id}">削除</button>
        </div>
      </div>
    `).join("") : `<div class="empty-panel">章はまだ登録されていません。</div>`;
  }

  outlineForm.addEventListener("submit", async (event) => {
    event.preventDefault();
    const body = Object.fromEntries(new FormData(outlineForm).entries());
    try {
      const result = await NovelUI.api(`/api/v1/projects/${projectId}/story-outline`, { method: "PUT", body });
      if (result.story_outline) {
        NovelUI.fillForm(outlineForm, result.story_outline);
        renderChapterSuggestions(result.story_outline.outline_json);
      }
      NovelUI.toast("骨子を保存しました。");
    } catch (error) {
      NovelUI.toast(error.message || "保存に失敗しました。", "danger");
    }
  });

  document.getElementById("chapterCreateForm").addEventListener("submit", async (event) => {
    event.preventDefault();
    const chapterForm = event.currentTarget;
    const body = Object.fromEntries(new FormData(chapterForm).entries());
    try {
      await NovelUI.api(`/api/v1/projects/${projectId}/chapters`, { method: "POST", body });
      chapterForm.reset();
      await loadOutline();
      NovelUI.toast("章を追加しました。");
    } catch (error) {
      NovelUI.toast(error.message || "章追加に失敗しました。", "danger");
    }
  });

  outlineGenerateButton.addEventListener("click", async () => {
    const body = Object.fromEntries(new FormData(outlineForm).entries());
    setOutlineGenerating(true);
    try {
      const result = await NovelUI.api(`/api/v1/projects/${projectId}/story-outline/generate`, { method: "POST", body });
      if (result.story_outline) {
        NovelUI.fillForm(outlineForm, result.story_outline);
        renderChapterSuggestions(result.story_outline.outline_json);
      }
      NovelUI.toast("AIで骨子を作成しました。");
    } catch (error) {
      NovelUI.toast(error.message || "骨子生成に失敗しました。", "danger");
    } finally {
      setOutlineGenerating(false);
    }
  });

  chapterList.addEventListener("click", async (event) => {
    const button = event.target.closest("[data-delete-chapter]");
    if (!button) return;

    const chapterId = Number(button.dataset.deleteChapter);
    if (!chapterId) return;

    if (!window.confirm("この章を削除しますか？")) {
      return;
    }

    try {
      await NovelUI.api(`/api/v1/chapters/${chapterId}`, { method: "DELETE", body: {} });
      await loadOutline();
      NovelUI.toast("章を削除しました。");
    } catch (error) {
      NovelUI.toast(error.message || "章削除に失敗しました。", "danger");
    }
  });

  loadOutline().catch((error) => NovelUI.toast(error.message || "読み込みに失敗しました。", "danger"));
})();
</script>
{% endblock %}
