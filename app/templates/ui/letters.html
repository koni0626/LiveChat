{% extends "base.html" %}
{% block content %}
<section class="page-grid letter-page">
  <section class="panel-card letter-hero">
    <div>
      <div class="eyebrow">Mailbox</div>
      <h2>キャラクターから届いたメール</h2>
      <p>ライブチャットの余韻から、AIキャラクターが「今なら届けたい」と判断したメッセージがここに届きます。</p>
    </div>
    <button class="btn btn-outline-light btn-sm" type="button" id="letterRefreshButton">
      <i class="bi bi-arrow-clockwise"></i>
      更新
    </button>
  </section>

  <section class="panel-card">
    <div class="panel-head">
      <h3>メールボックス</h3>
      <span class="soft-code" id="letterCountLabel">0 letters</span>
    </div>
    <div class="letter-grid" id="letterList"></div>
  </section>
</section>

<div class="modal fade" id="letterModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content letter-modal">
      <div class="modal-header">
        <div>
          <div class="eyebrow">Mail</div>
          <h5 class="modal-title" id="letterModalTitle">メール</h5>
        </div>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="閉じる"></button>
      </div>
      <div class="modal-body">
        <div class="letter-modal-image-wrap d-none" id="letterModalImageWrap">
          <img alt="メールの添付画像" id="letterModalImage">
        </div>
        <div class="letter-paper">
          <div class="letter-paper-from" id="letterModalFrom"></div>
          <div class="letter-paper-body" id="letterModalBody"></div>
        </div>
      </div>
      <div class="modal-footer justify-content-between">
        <button class="btn btn-outline-danger btn-sm" type="button" id="letterArchiveButton">
          <i class="bi bi-trash3"></i>
          削除
        </button>
        <a class="btn btn-sunrise btn-sm" id="letterReturnLink" href="#">
          ルームへ行く
          <i class="bi bi-arrow-right"></i>
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/letters_page.js') }}"></script>
{% endblock %}
