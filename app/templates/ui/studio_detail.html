{% extends "base.html" %}
{% block content %}
<section class="studio-detail-shell" data-project-id="{{ project_id }}" data-asset-id="{{ asset_id }}">
  <section class="panel-card">
    <div class="panel-head">
      <div>
        <h3>画像編集</h3>
        <p class="section-copy mb-0">選択画像を基準に、背景・衣装・表情・ポーズを変更します。</p>
      </div>
      <a class="btn btn-sm btn-outline-dark" href="{{ url_for('ui.studio_page', project_id=project_id) }}">ギャラリーへ</a>
    </div>

    <div class="studio-detail-hero" id="studioSelectedPanel">
      <div class="empty-panel">画像を読み込んでいます...</div>
    </div>
  </section>

  <section class="panel-card">
    <div class="panel-head">
      <h3>編集</h3>
    </div>
    <form class="studio-form" id="studioForm">
      <label class="form-label" for="studioInstructionInput">変更指示</label>
      <textarea class="form-control" id="studioInstructionInput" rows="5" placeholder="例: 背景を夏の海に変えて、衣装を白いワンピースにし、明るい笑顔にする"></textarea>

      <div class="row g-2">
        <div class="col-md-6">
          <label class="form-label" for="studioQualitySelect">品質</label>
          <select class="form-select" id="studioQualitySelect">
            <option value="medium">medium</option>
            <option value="low">low</option>
            <option value="high">high</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label" for="studioSizeSelect">画像サイズ</label>
          <select class="form-select" id="studioSizeSelect">
            <option value="1536x1024">1536x1024</option>
            <option value="1024x1024">1024x1024</option>
            <option value="1024x1536">1024x1536</option>
          </select>
        </div>
      </div>

      <button class="btn btn-sunrise" type="submit" id="studioGenerateButton">画像を変更</button>
    </form>
  </section>

  <section class="panel-card">
    <div class="panel-head">
      <h3>ギャラリー</h3>
      <button class="btn btn-sm btn-outline-dark" type="button" id="studioReloadButton">再読み込み</button>
    </div>
    <div class="studio-filter-bar">
      <div>
        <label class="form-label" for="studioSourceSelect">カテゴリ</label>
        <select class="form-select" id="studioSourceSelect">
          <option value="all">すべて</option>
          <option value="chat">チャット</option>
          <option value="costume">衣装</option>
          <option value="story">ストーリー</option>
          <option value="outing">おでかけ</option>
          <option value="studio">編集画像</option>
        </select>
      </div>
      <div>
        <label class="form-label" for="studioSearchInput">検索</label>
        <input class="form-control" id="studioSearchInput" type="search" placeholder="ファイル名・プロンプト・種類で検索">
      </div>
    </div>
    <div class="studio-grid" id="studioImageGrid"></div>
    <div class="studio-pagination" id="studioPagination" aria-label="スタジオ画像ページ"></div>
  </section>
</section>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/studio_detail_page.js') }}"></script>
{% endblock %}
