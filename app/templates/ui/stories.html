{% extends "base.html" %}
{% block content %}
<section class="page-grid" data-project-id="{{ project_id }}">
  <section class="panel-card">
    <div class="panel-head">
      <div>
        <h3>ストーリー</h3>
        <p class="section-copy mb-0">TRPGセッションの元になる物語設定を管理します。</p>
      </div>
      <div class="d-flex gap-2 flex-wrap">
        {% if current_user_role in ["superuser", "project_user"] %}
        <a class="btn btn-sunrise btn-sm" href="{{ url_for('ui.story_create_page', project_id=project_id) }}">
          <i class="bi bi-plus-lg"></i>
          <span>新規追加</span>
        </a>
        {% endif %}
        <button class="btn btn-sm btn-outline-dark" type="button" id="storyReloadButton">再読み込み</button>
      </div>
    </div>
    <div class="project-card-grid entity-card-grid-two" id="storyGrid"></div>
  </section>
</section>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/stories_page.js') }}"></script>
{% endblock %}
