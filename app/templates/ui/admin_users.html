{% extends "base.html" %}
{% block content %}
<section class="content-grid">
  <section class="panel-card span-5">
    <div class="panel-head">
      <h3>プロジェクトユーザー登録</h3>
    </div>
    <form class="vstack gap-3" id="adminUserCreateForm">
      <div>
        <label class="form-label" for="adminUserEmail">メールアドレス</label>
        <input class="form-control" id="adminUserEmail" name="email" type="email" required>
      </div>
      <div>
        <label class="form-label" for="adminUserDisplayName">表示名</label>
        <input class="form-control" id="adminUserDisplayName" name="display_name" required>
      </div>
      <div>
        <label class="form-label" for="adminUserPassword">初期パスワード</label>
        <input class="form-control" id="adminUserPassword" name="password" type="password" required>
      </div>
      <div>
        <label class="form-label" for="adminUserRole">ロール</label>
        <select class="form-select" id="adminUserRole" name="role">
          <option value="project_user" selected>プロジェクトユーザー</option>
          <option value="user">ユーザー</option>
          <option value="superuser">スーパーユーザー</option>
        </select>
      </div>
      <button class="btn btn-sunrise" type="submit">ユーザーを作成</button>
    </form>
  </section>

  <section class="panel-card span-7">
    <div class="panel-head">
      <h3>ユーザー一覧</h3>
      <button class="btn btn-sm btn-outline-dark" type="button" id="adminUsersReloadButton">再読み込み</button>
    </div>
    <div class="list-stack" id="adminUserList"></div>
  </section>
</section>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/admin_users_page.js') }}"></script>
{% endblock %}
