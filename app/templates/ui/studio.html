{% extends "base.html" %}
{% block content %}
<section class="panel-card studio-main" data-project-id="{{ project_id }}">
  <div class="panel-head">
    <div>
      <h3>スタジオ</h3>
      <p class="section-copy mb-0">チャット、ストーリー、おでかけで生成された画像を選択して編集します。</p>
    </div>
    <button class="btn btn-sm btn-outline-dark" type="button" id="studioReloadButton">再読み込み</button>
  </div>
  <div class="studio-filter-bar">
    <div>
      <label class="form-label" for="studioSourceSelect">カテゴリ</label>
      <select class="form-select" id="studioSourceSelect">
        <option value="all">すべて</option>
        <option value="chat">チャット</option>
        <option value="costume">衣装</option>
        <option value="story">ストーリー</option>
        <option value="outing">おでかけ</option>
        <option value="studio">編集画像</option>
      </select>
    </div>
    <div>
      <label class="form-label" for="studioSearchInput">検索</label>
      <input class="form-control" id="studioSearchInput" type="search" placeholder="ファイル名・プロンプト・種類で検索">
    </div>
  </div>
  <div class="studio-grid" id="studioImageGrid"></div>
  <div class="studio-pagination" id="studioPagination" aria-label="スタジオ画像ページ"></div>
</section>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/studio_page.js') }}"></script>
{% endblock %}
